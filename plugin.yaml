name: agent_company
manifest_version: 1
version: 0.1.0
label: "Agent Company — multi-role sub-agents (Discord)"
author: "bykim0119"
description: |
  Background delegation to a *company* of role-specialized sub-agents
  (planner, coder, tester, reviewer) coordinated by the main agent.
  Coder/tester run via the Codex CLI (``codex exec``); planner/reviewer use
  the main reasoning model. Sub-agents run in daemon threads and stream live
  progress to the platform UI. Adds the ``delegate_task_background`` tool
  (with a ``role`` parameter) plus a Discord overlay (``/code`` slash command
  + sub-agent thread follow-ups). The core is platform-agnostic; Discord is
  the first integration.

  Requires the ``codex`` CLI on PATH and Codex auth (``~/.codex/auth.json``).
provides_tools:
  - delegate_task_background
